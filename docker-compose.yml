
services:
  sd-editor:
    image:  registry.diginfra.net/tsd/huc-editor-services:2.0-RC13-alpha 
    restart: unless-stopped
    environment:
      - BASE_URL=http://localhost:1210
      - CDN_URL=http://localhost:1310/
    volumes:
      - ./data:/home/huc/huc-editor-service/data
      - ./ccf_config_en.js:/home/huc/huc-editor-service/resources/static/js/ccf_config_en.js
    networks:
      - sd-editor
    ports:
      - '1210:1210'
  sd-editor-cdn:
    image: registry.diginfra.net/tsd/huc-generic-editor:1.3-RC9-alpha
    restart: unless-stopped
    ports:
      - 1310:80
    networks:
      - sd-editor

networks:
  sd-editor:
    external: false
